services:
  # Frontend - Static site on Vercel (config in vercel.json)
  # Backend API - Web service on Render

  - type: web
    name: finrelief-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DATABASE_URL
        value: sqlite:///./finrelief.db
      - key: CORS_ORIGINS
        value: '["https://finrelief.vercel.app","http://localhost:5173"]'
